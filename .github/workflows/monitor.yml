name: Server Monitor
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check server
        env:
          CHECK_URL: "https://thiswebsitedoesnotexist12345.com"
          WEBHOOK_URL: "YOUR_NEW_WEBHOOK_URL"
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$CHECK_URL")
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            curl -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"🚨 **Server is DOWN!** Status code: \`$STATUS\`\"}"
          else
            echo "Server is UP"
          fi

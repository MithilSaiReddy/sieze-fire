name: Server Monitor
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check server
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://thiswebsitedoesnotexist12345.com)
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            curl -X POST "https://discord.com/api/webhooks/1508334542103122072/xNjRT2H-wlTewkbyiSEXdzLSWlVU2chSrQh6H_QbootaDrbDKr3Gu5b4exWpzvmMBRPu" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"🚨 **Server is DOWN!** Status code: \`$STATUS\`\"}"
          else
            echo "Server is UP"
          fi

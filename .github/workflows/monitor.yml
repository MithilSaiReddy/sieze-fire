name: Server Monitor
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check server
        env:
          CHECK_URL: "https://httpstat.us/500"
          WEBHOOK_URL: "https://discord.com/api/webhooks/1508334542103122072/xNjRT2H-wlTewkbyiSEXdzLSWlVU2chSrQh6H_QbootaDrbDKr3Gu5b4exWpzvmMBRPu"
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$CHECK_URL")
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            curl -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"🚨 **Server is DOWN!** Status code: \`$STATUS\`\"}"
          else
            echo "Server is UP"
          fi
